<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no" />
<meta charset="UTF-8" />
<link rel="shortcut icon" href="favicon.ico">
<script type="text/javascript" src="speedtest.js"></script>
<script type="text/javascript">
function I(i){return document.getElementById(i);}
//INITIALIZE SPEEDTEST
var s=new Speedtest(); //create speedtest object
s.setParameter("telemetry_level","none"); //disable telemetry (no PHP backend)
s.setParameter("getIp_ispInfo",false);     //disable getispInfo
s.setParameter("time_dl_max",5); //5 seconds for the download test
s.setParameter("time_ul_max",5); //5 seconds for the upload test

var meterBk=/Trident.*rv:(\d+\.\d+)/i.test(navigator.userAgent)?"#EAEAEA":"#80808040";
var dlColor="#6060AA",
	ulColor="#309030";
var progColor=meterBk;

//CODE FOR GAUGES
function drawMeter(c,amount,bk,fg,progress,prog){
	var ctx=c.getContext("2d");
	var dp=window.devicePixelRatio||1;
	var cw=c.clientWidth*dp, ch=c.clientHeight*dp;
	var sizScale=ch*0.0055;
	if(c.width==cw&&c.height==ch){
		ctx.clearRect(0,0,cw,ch);
	}else{
		c.width=cw;
		c.height=ch;
	}
	ctx.beginPath();
	ctx.strokeStyle=bk;
	ctx.lineWidth=12*sizScale;
	ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,Math.PI*0.1);
	ctx.stroke();
	ctx.beginPath();
	ctx.strokeStyle=fg;
	ctx.lineWidth=12*sizScale;
	ctx.arc(c.width/2,c.height-58*sizScale,c.height/1.8-ctx.lineWidth,-Math.PI*1.1,amount*Math.PI*1.2-Math.PI*1.1);
	ctx.stroke();
	if(typeof progress !== "undefined"){
		ctx.fillStyle=prog;
		ctx.fillRect(c.width*0.3,c.height-16*sizScale,c.width*0.4*progress,4*sizScale);
	}
}
function mbpsToAmount(s){
	return 1-(1/(Math.pow(1.3,Math.sqrt(s))));
}
function format(d){
	d=Number(d);
	// Convert Mbps to MB/s (divide by 8)
	d = d / 8;
	if(d<10) return d.toFixed(2);
	if(d<100) return d.toFixed(1);
	return d.toFixed(0);
}

//UI CODE
var uiData=null;
function startStop(){
	if(s.getState()==3){
		//speedtest is running, abort
		s.abort();
		data=null;
		I("startStopBtn").className="";
		initUI();
	}else{
		//test is not running, begin
		I("startStopBtn").className="running";
		// Disable PHP results loading
		// document.getElementById("results").innerHTML = '<object type="text/html" data="results/result.php" width="100%" height="1200px"></object>';
		// I("shareArea").style.display="none";
		// Ensure results area is hidden
		I("results").style.display = "none";
		// Get IP address from frontend API
		fetch('https://api.ipify.org?format=json')
			.then(response => response.json())
			.then(data => {
				I("ip").textContent = data.ip;
			})
			.catch(error => {
				console.log('Could not get IP:', error);
				I("ip").textContent = "未知";
			});
		s.onupdate=function(data){
			uiData=data;
		};
		s.onend=function(aborted){
			I("startStopBtn").className="";
			updateUI(true);
			if(!aborted){
				//if testId is present, show sharing panel, otherwise do nothing
				try{
					var testId=uiData.testId;
					if(testId!=null){
						// Disable PHP results loading
						// document.getElementById("results").innerHTML = '<object type="text/html" data="results/result.php?id='+testId+'" width="100%" height="1500px"></object>';
						// Ensure results area stays hidden
						I("results").style.display = "none";
					}
				}catch(e){}
			}
		};
		s.start();
	}
}
//this function reads the data sent back by the test and updates the UI
function updateUI(forced){
	if(!forced&&s.getState()!=3) return;
	if(uiData==null) return;
	var status=uiData.testState;
	// IP address is now fetched from frontend API, not from uiData
	I("dlText").textContent=(status==1&&uiData.dlStatus==0)?"...":format(uiData.dlStatus);
	drawMeter(I("dlMeter"),mbpsToAmount(Number(uiData.dlStatus*(status==1?oscillate():1))),meterBk,dlColor,Number(uiData.dlProgress),progColor);
	I("ulText").textContent=(status==3&&uiData.ulStatus==0)?"...":format(uiData.ulStatus);
	drawMeter(I("ulMeter"),mbpsToAmount(Number(uiData.ulStatus*(status==3?oscillate():1))),meterBk,ulColor,Number(uiData.ulProgress),progColor);
	I("pingText").textContent=format(uiData.pingStatus);
	I("jitText").textContent=format(uiData.jitterStatus);
}
function oscillate(){
	return 1+0.02*Math.sin(Date.now()/100);
}
//update the UI every frame
window.requestAnimationFrame=window.requestAnimationFrame||window.webkitRequestAnimationFrame||window.mozRequestAnimationFrame||window.msRequestAnimationFrame||(function(callback,element){setTimeout(callback,1000/60);});
function frame(){
	requestAnimationFrame(frame);
	updateUI();
}
frame(); //start frame loop
//function to (re)initialize UI
function initUI(){
	drawMeter(I("dlMeter"),0,meterBk,dlColor,0);
	drawMeter(I("ulMeter"),0,meterBk,ulColor,0);
	I("dlText").textContent="";
	I("ulText").textContent="";
	I("pingText").textContent="";
	I("jitText").textContent="";
	I("ip").textContent="";
}
</script>
<style type="text/css">
	html,body{
		border:none; padding:0; margin:0;
		background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		color:#202020;
		height: 100%;
		overflow: hidden;
	}
	body{
		text-align:center;
		font-family:"Segoe UI","Roboto","Helvetica Neue",sans-serif;
		min-height: 100vh;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
	}
	h1{
		color:#FFFFFF;
		margin: 0 0 2em 0;
		font-size: 2.2em;
		font-weight: 300;
		text-shadow: 0 2px 10px rgba(0,0,0,0.2);
		letter-spacing: 1px;
	}
	h1 a{
		color:#FFFFFF;
		text-decoration: none;
		opacity: 0.8;
		transition: opacity 0.3s;
	}
	h1 a:hover{
		opacity: 1;
		text-decoration: underline;
	}
	#startStopBtn{
		display:inline-flex;
		align-items: center;
		justify-content: center;
		margin:0 auto 2em auto;
		color:#FFFFFF;
		background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
		border:none;
		border-radius:50px;
		transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		box-sizing:border-box;
		width:10em; height:3.5em;
		cursor:pointer;
		box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
		font-weight: 600;
		font-size: 1.1em;
		position: relative;
		overflow: hidden;
		z-index: 10;
	}
	#startStopBtn::before{
		content:"开始测速";
		position: relative;
		z-index: 2;
	}
	#startStopBtn::after{
		content:"";
		position: absolute;
		top: 0;
		left: -100%;
		width: 100%;
		height: 100%;
		background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
		transition: left 0.5s;
		z-index: 1;
	}
	#startStopBtn:hover::after{
		left: 100%;
	}
	#startStopBtn:hover{
		transform: translateY(-2px);
		box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
	}
	#startStopBtn:active{
		transform: translateY(0);
	}
	#startStopBtn.running{
		background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
		box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
	}
	#startStopBtn.running:hover{
		box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
	}
	#startStopBtn.running::before{
		content:"终止测速";
	}
	#test{
		margin-top: 0;
		margin-bottom: 0;
		background: rgba(255, 255, 255, 0.95);
		padding: 2em;
		border-radius: 20px;
		box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
		backdrop-filter: blur(10px);
	}
	div.testArea{
		display:inline-block;
		width:14em;
		height:11em;
		position:relative;
		box-sizing:border-box;
		margin: 0.5em;
	}
	div.testArea2{
		display:inline-block;
		width:10em;
		height:7em;
		position:relative;
		box-sizing:border-box;
		text-align:center;
		margin: 0.5em;
		padding: 0.5em;
		background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
		border-radius: 15px;
		box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
		transition: transform 0.3s, box-shadow 0.3s;
	}
	div.testArea2:hover{
		transform: translateY(-3px);
		box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
	}
	div.testArea div.testName{
		position:absolute;
		top:0.1em; left:0;
		width:100%;
		font-size:1.2em;
		z-index:9;
		color: #555;
		font-weight: 500;
	}
	div.testArea2 div.testName{
        display:block;
        text-align:center;
        font-size:1.1em;
		font-weight: 600;
		color: #444;
		margin-bottom: 0.3em;
	}
	div.testArea div.meterText{
		position:absolute;
		bottom:1.55em; left:0;
		width:100%;
		font-size:2.8em;
		z-index:9;
		font-weight: 700;
		text-shadow: 0 2px 5px rgba(0,0,0,0.1);
	}
	div.testArea2 div.meterText{
        display:inline-block;
        font-size:2.2em;
		font-weight: 700;
		color: #333;
	}
	div.meterText:empty:before{
		content:"0.00";
	}
	div.testArea div.unit{
		position:absolute;
		bottom:2em; left:0;
		width:100%;
		z-index:9;
		color: #888;
		font-size: 0.9em;
	}
	div.testArea2 div.unit{
		display:inline-block;
		color: #888;
		font-size: 0.85em;
	}
	div.testArea canvas{
		position:absolute;
		top:0; left:0; width:100%; height:100%;
		z-index:1;
	}
	div.testGroup{
		display:block;
        margin: 0.5em auto;
	}
	#ipArea{
		margin-top: 1.5em;
		padding: 0.8em 1.5em;
		background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
		border-radius: 30px;
		color: #555;
		font-size: 0.95em;
		font-weight: 500;
		box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
		display: inline-block;
	}
	#ipArea span{
		color: #667eea;
		font-weight: 600;
	}
	#shareArea{
		width:95%;
		max-width:40em;
		margin:0 auto;
		margin-top:2em;
	}
	#shareArea > *{
		display:block;
		width:100%;
		height:auto;
		margin: 0.25em 0;
	}
	#privacyPolicy{
        position:fixed;
        top:2em;
        bottom:2em;
        left:2em;
        right:2em;
        overflow-y:auto;
        width:auto;
        height:auto;
        box-shadow:0 0 3em 1em #000000;
        z-index:999999;
        text-align:left;
        background-color:#FFFFFF;
        padding:1em;
	}
	a.privacy{
        text-align:center;
        font-size:0.8em;
        color:#808080;
        padding: 0 3em;
    }
    div.closePrivacyPolicy {
        width: 100%;
        text-align: center;
    }
    div.closePrivacyPolicy a.privacy {
        padding: 1em 3em;
    }
	@media all and (max-width:40em){
		body{
			font-size:0.8em;
		}
		h1{
			font-size: 1.5em;
		}
		#test{
			padding: 1.5em;
		}
	}
</style>
<title>speedtest</title>
</head>
<body>
<h1>speedtest(<a href=http://test.ustc.edu.cn/>4</a> / <a href=http://test6.ustc.edu.cn/>6</a>)</h1>
<div id="testWrapper">
	<div id="startStopBtn" onclick="startStop()"></div><br/>
	<div id="test">
		<div class="testGroup">
			<div class="testArea2">
				<div class="testName">网络延迟</div>
				<div id="pingText" class="meterText" style="color:#AA6060"></div>
				<div class="unit">ms</div>
			</div>
			<div class="testArea2">
				<div class="testName">延迟抖动</div>
				<div id="jitText" class="meterText" style="color:#AA6060"></div>
				<div class="unit">ms</div>
			</div>
		</div>
		<div class="testGroup">
			<div class="testArea">
				<div class="testName">下载速度</div>
				<canvas id="dlMeter" class="meter"></canvas>
				<div id="dlText" class="meterText"></div>
				<div class="unit">MB/s</div>
			</div>
			<div class="testArea">
				<div class="testName">上传速度</div>
				<canvas id="ulMeter" class="meter"></canvas>
				<div id="ulText" class="meterText"></div>
				<div class="unit">MB/s</div>
			</div>
		</div>
		<div id="ipArea">
			<span id="ip"></span>
		</div>
	</div>
<div id="results" style="display:none;"></div>
<script type="text/javascript">
	setTimeout(function(){initUI()},100);
	// Disable PHP results loading on page load
	// document.getElementById("results").innerHTML = '<object type="text/html" data="results/result.php" width="100%" height="1200px"></object>';
	document.getElementById("results").innerHTML = '';
	document.getElementById("results").style.display = 'none';
	// Don't auto-start the test, let user click the button
	// startStop();
</script>
</body>
</html>
